  <rect width="800" height="200" rx="12" fill="url(#paint0_linear)"/>
  
  <!-- Abstract Tech Patterns -->
  <path d="M0 100L50 80L100 120L150 100L200 130L250 90L300 110L350 70L400 100" stroke="#58A6FF" stroke-opacity="0.1" stroke-width="2" fill="none"/>
