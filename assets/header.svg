  <circle cx="750" cy="150" r="10" stroke="#58A6FF" stroke-opacity="0.1" stroke-width="1"/>
  
  <!-- Text -->
  <text x="40" y="110" font-family="Arial, sans-serif" font-weight="800" font-size="64" fill="url(#text_gradient)" filter="url(#glow)">HAMZA HAFEEZ</text>
  <text x="45" y="150" font-family="Arial, sans-serif" font-weight="400" font-size="20" fill="#8B949E" letter-spacing="4">SYSTEMS ARCHITECT &amp; VISIONARY</text>
  
  <!-- Accent Line -->
